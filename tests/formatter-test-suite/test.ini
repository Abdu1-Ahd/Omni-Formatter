# ── CASE 1: Comments and basic key-value ──────────────────────────────────
[server]
host=localhost
port = 8080
debug=  true
log_level =   info

# empty value
description =

[database]
host    = 127.0.0.1
port    = 5432
name    = mydb
user    = admin
password= secret
pool    = 5
timeout =30

# ── CASE 2: Multiple sections ─────────────────────────────────────────────
[cache]
backend = redis
host = localhost
port = 6379
ttl  =  3600

[logging]
file    = /var/log/app.log
level   = INFO
rotate  = daily
max_size= 100MB

# ── CASE 3: Quoted values ─────────────────────────────────────────────────
[paths]
home_dir   = "/home/user"
config_dir = '/etc/myapp'
temp_dir   = "C:\\Windows\\Temp"
data_dir   = /usr/local/share/myapp

# ── CASE 4: List values (some parsers support) ───────────────────────────
[features]
enabled = feature1, feature2, feature3
disabled = legacy_auth, old_api
