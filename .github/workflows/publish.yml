name: Publish Extension

on:
  push:
    tags:
      - 'v*' # Trigger automatically when a version tag like v0.1.0 is pushed
  workflow_dispatch: # Allow manual triggering from the GitHub Actions tab

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        working-directory: ./extension

      - name: Package Extension
        run: npx vsce package
        working-directory: ./extension

      - name: Publish to VS Code Marketplace
        run: npx vsce publish -p ${{ secrets.VSCE_PAT }}
        working-directory: ./extension
        continue-on-error: true # Prevents failing the whole job if it's already published

      - name: Publish to Open VSX Registry
        run: npx ovsx publish -p ${{ secrets.OVSX_PAT }}
        working-directory: ./extension
        continue-on-error: true
