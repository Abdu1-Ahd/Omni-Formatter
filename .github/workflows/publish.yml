name: Publish & Release

on:
  push:
    tags:
      - 'v*' # Trigger automatically when a version tag like v0.1.0 is pushed
  workflow_dispatch: # Allow manual triggering from the GitHub Actions tab

permissions:
  contents: write   # Create GitHub Release + upload assets
  pages: write      # Push to gh-pages branch
  id-token: write   # GitHub Pages OIDC

jobs:
  # ── Job 1: Publish Extension to VS Code Marketplaces ──────────────────────
  publish-extension:
    name: Publish Extension
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        working-directory: ./extension

      - name: Package Extension
        run: npx vsce package
        working-directory: ./extension

      - name: Publish to VS Code Marketplace
        run: npx vsce publish -p ${{ secrets.VSCE_PAT }}
        working-directory: ./extension
        continue-on-error: true # Prevents failing the whole job if it's already published

      - name: Publish to Open VSX Registry
        run: npx ovsx publish -p ${{ secrets.OVSX_PAT }}
        working-directory: ./extension
        continue-on-error: true

  # ── Job 2: Build WASM, create GitHub Release, upload binary ─────────────
  release-wasm:
    name: Build & Release WASM
    runs-on: ubuntu-latest
    needs: publish-extension
    outputs:
      version: ${{ steps.meta.outputs.version }}
      sha256:  ${{ steps.hash.outputs.sha256 }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust + WASM target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-wasm-${{ hashFiles('**/Cargo.toml') }}

      - name: Install wasm-pack
        run: cargo install wasm-pack --version "^0.13" --locked

      - name: Build WASM core
        run: bash scripts/build-wasm.sh

      # The build script places the output at extension/dist/wasm/omni_core_bg.wasm
      - name: Extract version from tag
        id: meta
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Compute SHA-256
        id: hash
        run: |
          SHA=$(sha256sum extension/dist/wasm/omni_core_bg.wasm | awk '{print $1}')
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release and upload WASM
        id: upload
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "OmniFormatter ${{ github.ref_name }}"
          generate_release_notes: true
          files: extension/dist/wasm/omni_core_bg.wasm

  # ── Job 3: Publish static JSON manifest to gh-pages ─────────────────────
  publish-registry:
    name: Publish Registry Manifest
    runs-on: ubuntu-latest
    needs: release-wasm

    steps:
      - uses: actions/checkout@v4

      # Check out gh-pages branch, or create it as an orphan on first run.
      - name: Prepare gh-pages branch
        run: |
          git fetch origin gh-pages:gh-pages 2>/dev/null && git checkout gh-pages || (
            git checkout --orphan gh-pages
            git rm -rf . --quiet
            echo '# OmniFormatter Registry' > README.md
            git add README.md
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "chore: initialise gh-pages registry branch"
          )

      # Generate resolve/core.json — the single file the extension queries.
      # Format mirrors RegistryResolveResponse in moduleLoader.ts.
      # ponytail: download_url is deterministic from tag + filename; no output parsing needed.
      - name: Write resolve/core.json
        env:
          VERSION:  ${{ needs.release-wasm.outputs.version }}
          SHA256:   ${{ needs.release-wasm.outputs.sha256 }}
          REPO:     ${{ github.repository }}
          TAG:      ${{ github.ref_name }}
        run: |
          mkdir -p resolve
          DOWNLOAD_URL="https://github.com/${REPO}/releases/download/${TAG}/omni_core_bg.wasm"
          printf '{\n  "name": "core",\n  "version": "%s",\n  "download_url": "%s",\n  "sha256": "%s"\n}\n' \
            "$VERSION" "$DOWNLOAD_URL" "$SHA256" > resolve/core.json

      - name: Commit and push manifest
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add resolve/core.json
          git diff --cached --quiet && echo "No changes to publish" && exit 0
          git commit -m "registry: publish core v${{ needs.release-wasm.outputs.version }}"
          git push origin gh-pages
