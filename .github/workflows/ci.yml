name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}

      - name: Rust format check
        run: cargo fmt --all -- --check

      - name: Rust clippy (zero warnings)
        run: cargo clippy --all-targets -- -D warnings

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install Node deps
        run: pnpm install --frozen-lockfile
        working-directory: extension

      - name: TypeScript lint
        run: pnpm lint
        working-directory: extension

  test:
    name: Test
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}

      - name: Rust tests
        run: cargo test --workspace

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install Node deps
        run: pnpm install --frozen-lockfile
        working-directory: extension

      - name: TypeScript tests
        run: pnpm test
        working-directory: extension

  build:
    name: Build
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable + WASM target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: cargo install wasm-pack --version "^0.13"

      - name: Cache Rust deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-wasm-${{ hashFiles('**/Cargo.toml') }}

      - name: Build WASM core
        run: bash scripts/build-wasm.sh

      - name: WASM smoke test
        timeout-minutes: 2
        run: |
          cd tests/wasm_integration
          node smoke_test.js

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Build extension
        run: |
          pnpm install --frozen-lockfile
          pnpm build:all
        working-directory: extension

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: core-wasm-nomodules
          path: extension/dist/wasm/

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: core-wasm
          path: crates/core/pkg/
