name: Feature Request
description: Propose a new language module, feature, or architectural enhancement
labels: ["type::feature"]
body:
  - type: markdown
    attributes:
      value: |
        Fill in all required fields. Proposals without a clear problem statement will be closed.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: Describe the problem this feature solves. Be specific.
      placeholder: "There is no OmniFormatter module for Zig. Zig files currently receive no formatting."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the implementation approach. Reference existing modules as a pattern if applicable.
      placeholder: |
        Add a `crates/lang-zig/` module implementing the OmniFormatterModule interface,
        using the tree-sitter-zig grammar. Target output parity with `zig fmt`.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Considered Alternatives
      description: What other approaches were considered and why were they rejected?
      placeholder: "Calling the `zig fmt` system binary was considered but violates the WASM-only constraint (L-02, L-04)."
    validations:
      required: true

  - type: checkboxes
    id: constraints
    attributes:
      label: Architecture Constraints Check
      description: Confirm the proposed solution complies with OmniFormatter's seven core pillars.
      options:
        - label: Uses Tree-sitter as the parser foundation (Pillar 1)
          required: true
        - label: Language module is a separate `.wasm` file — not bundled into core (Pillar 2)
          required: true
        - label: Zone-aware (if the language supports embedded zones) (Pillar 3)
          required: true
        - label: Implements the idempotency contract (Pillar 7)
          required: true
