<svg xmlns="http://www.w3.org/2000/svg" viewBox="-40 -20 240 240" width="240" height="240">
  <defs>
    <linearGradient id="outerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="innerGrad" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="trailGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="trailGradBlue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <!-- Speed Trails -->
  <path d="M 5 65 L 80 65.01" stroke="url(#trailGrad)" stroke-width="6" stroke-linecap="round"/>
  <path d="M -20 82.5 L 45 82.51" stroke="url(#trailGradBlue)" stroke-width="4" stroke-linecap="round"/>
  <path d="M -40 100 L 60 100.01" stroke="url(#trailGrad)" stroke-width="6" stroke-linecap="round"/>
  <path d="M -20 117.5 L 45 117.51" stroke="url(#trailGradBlue)" stroke-width="4" stroke-linecap="round"/>
  <path d="M 5 135 L 80 135.01" stroke="url(#trailGrad)" stroke-width="6" stroke-linecap="round"/>

  <!-- Outer Hexagon (Nexus Core) -->
  <polygon points="185,100 157.5,147.6 102.5,147.6 75,100 102.5,52.4 157.5,52.4" fill="none" stroke="url(#outerGrad)" stroke-width="8" stroke-linejoin="round"/>
  
  <!-- Inner Dynamic Shape (Nexus Inner Hexagon) -->
  <polygon points="165,100 147.5,130.3 112.5,130.3 95,100 112.5,69.7 147.5,69.7" fill="url(#innerGrad)" opacity="0.85" stroke-linejoin="round"/>
  
  <!-- Central Energy Core -->
  <circle cx="130" cy="100" r="12" fill="#ffffff" opacity="0.95"/>
</svg>