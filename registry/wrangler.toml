# OmniFormatter Registry — Cloudflare Workers Deployment Config
#
# Deploy with:
#   wrangler deploy
#   wrangler deploy --env staging
#
# Required Cloudflare resources (create once with wrangler cli):
#   wrangler r2 bucket create omnifmt-modules
#   wrangler d1 create omnifmt-registry
#   wrangler secret put REGISTRY_SIGNING_KEY   # Ed25519 private key (base64)

name = "omnifmt-registry"
main = "dist/worker.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]


# ── D1 database bindings ──────────────────────────────────────────────────
[[d1_databases]]
binding     = "REGISTRY_DB"
database_name = "omni-formatter-db"
database_id = "43a343af-39ad-4bf8-af2a-354812bacfb4"   # set after `wrangler d1 create`

# ── Staging environment ───────────────────────────────────────────────────
[env.staging]
name = "omnifmt-registry-staging"
route = { pattern = "registry-staging.omnifmt.dev/*", zone_name = "omnifmt.dev" }

[[env.staging.d1_databases]]
binding       = "REGISTRY_DB"
database_name = "omnifmt-registry-staging"
database_id   = "REPLACE_WITH_STAGING_D1_ID"

# ── Observability ─────────────────────────────────────────────────────────
[observability]
enabled = true
